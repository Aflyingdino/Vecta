openapi: 3.0.3
info:
  title: Vecta API
  version: 1.0.0
  description: Session-based API for Vecta frontend.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /api
security:
  - cookieAuth: []
paths:
  /csrf:
    get:
      operationId: getCsrfToken
      summary: Get CSRF token
      security: []
      responses:
        '200':
          description: CSRF token
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      operationId: registerUser
      summary: Register account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      operationId: loginUser
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      operationId: logoutUser
      summary: Logout
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Current authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects:
    get:
      operationId: listProjects
      summary: List projects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectSummary'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createProject
      summary: Create project
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSummary'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{id}:
    get:
      operationId: getProject
      summary: Get full project payload
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Full project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateProject
      summary: Update project
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSummary'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteProject
      summary: Delete project
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{id}/tasks:
    post:
      operationId: createTask
      summary: Create task
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}:
    patch:
      operationId: updateTask
      summary: Update task
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteTask
      summary: Delete task
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: vecta_session
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token

  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 10

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'

    CreateTaskRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [not_started, started, ready_for_test, done]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        deadline:
          type: string
          format: date
        groupId:
          type: integer
          nullable: true
        labelIds:
          type: array
          items:
            type: integer
        assigneeIds:
          type: array
          items:
            type: integer

    UpdateTaskRequest:
      type: object
      properties:
        text:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [not_started, started, ready_for_test, done]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        deadline:
          type: string
          format: date

    AuthUserResponse:
      type: object
      required: [id, name, email, csrfToken]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        csrfToken:
          type: string

    CurrentUserResponse:
      type: object
      required: [id, name, email, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ProjectSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        role:
          type: string

    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/ProjectSummary'
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/Member'
            labels:
              type: array
              items:
                $ref: '#/components/schemas/Label'
            groups:
              type: array
              items:
                $ref: '#/components/schemas/Group'
            backlog:
              type: array
              items:
                $ref: '#/components/schemas/Task'
            activity:
              type: array
              items:
                $ref: '#/components/schemas/Activity'

    PublicProject:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string
        groups:
          type: array
          items:
            $ref: '#/components/schemas/Group'
        backlog:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string

    Label:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [not_started, started, ready_for_test, done]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    Task:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        deadline:
          type: string
          nullable: true
        labelIds:
          type: array
          items:
            type: integer
        assigneeIds:
          type: array
          items:
            type: integer

    Activity:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        message:
          type: string
        createdAt:
          type: string
